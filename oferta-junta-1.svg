<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Oferta azucar y cafe">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b7d956"/>
      <stop offset="1" stop-color="#98c941"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0da14a"/>
      <stop offset="1" stop-color="#0b7e3b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#305b22" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg1)"/>
  <g opacity="0.18" fill="#7fb63f">
    <circle cx="80" cy="70" r="22"/><circle cx="200" cy="120" r="18"/><circle cx="350" cy="80" r="24"/>
    <circle cx="530" cy="110" r="20"/><circle cx="690" cy="70" r="21"/><circle cx="860" cy="100" r="19"/>
    <circle cx="1010" cy="75" r="23"/><circle cx="1120" cy="120" r="18"/><circle cx="150" cy="250" r="24"/>
    <circle cx="330" cy="270" r="19"/><circle cx="500" cy="240" r="22"/><circle cx="760" cy="250" r="20"/>
    <circle cx="940" cy="260" r="22"/><circle cx="1080" cy="230" r="19"/>
  </g>

  <rect x="35" y="85" width="325" height="420" rx="30" fill="#0f8f3f" stroke="#ffffff" stroke-width="8" filter="url(#shadow)"/>
  <text x="68" y="150" fill="#f3ff76" font-family="Arial, sans-serif" font-size="48" font-weight="900">APANO!</text>
  <text x="68" y="220" fill="#ffffff" font-family="Arial, sans-serif" font-size="66" font-weight="900">JUNTA DE</text>
  <text x="68" y="290" fill="#ff9f08" font-family="Arial, sans-serif" font-size="84" font-weight="900">OFERTAS</text>
  <text x="68" y="350" fill="#ffffff" font-family="Arial, sans-serif" font-size="38" font-weight="700">Super Trebol</text>

  <g filter="url(#shadow)">
    <rect x="410" y="105" width="360" height="230" rx="30" fill="url(#bubble1)" stroke="#ffffff" stroke-width="7"/>
    <text x="440" y="190" fill="#ffe83f" font-family="Arial, sans-serif" font-size="86" font-weight="900">$799</text>
    <text x="650" y="190" fill="#ffe83f" font-family="Arial, sans-serif" font-size="48" font-weight="800">c/u</text>
    <text x="440" y="245" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" font-weight="800">Azucar</text>
    <text x="440" y="285" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="600">Trebol 1 kilo</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="70" width="330" height="220" rx="28" fill="url(#bubble1)" stroke="#ffffff" stroke-width="7" transform="rotate(4 985 180)"/>
    <text x="852" y="152" fill="#ffe83f" font-family="Arial, sans-serif" font-size="72" font-weight="900">$5.490</text>
    <text x="1028" y="152" fill="#ffe83f" font-family="Arial, sans-serif" font-size="38" font-weight="800">c/u</text>
    <text x="852" y="204" fill="#ffffff" font-family="Arial, sans-serif" font-size="50" font-weight="800">Cafe</text>
    <text x="852" y="244" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="600">Nescafe 150 gr</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="640" y="325" width="140" height="235" rx="12" fill="#8fcb64"/>
    <rect x="640" y="325" width="140" height="60" rx="12" fill="#1a9849"/>
    <text x="665" y="370" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="800">AZUCAR</text>
    <rect x="790" y="355" width="180" height="205" rx="18" fill="#2f2726"/>
    <ellipse cx="880" cy="420" rx="72" ry="28" fill="#593d31"/>
    <text x="820" y="445" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="800">NESCAFE</text>
  </g>

</svg>
